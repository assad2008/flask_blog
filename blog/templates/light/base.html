       Style: Glass + Gradient accents

       ============================================ */

    /* ---------- Tokens ---------- */
    :root {
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-soft: #DBEAFE;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --gradient-accent: linear-gradient(135deg, #2563EB, #7C3AED);
      --gradient-subtle: linear-gradient(135deg, #EEF2FF, #F8FAFC, #F0F9FF);

      --bg-primary: #F8FAFC;
      --bg-secondary: #FFFFFF;
      --bg-raised: #FFFFFF;
      --bg-code: #F1F5F9;
      --bg-glass: rgba(255,255,255,0.72);

      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-tertiary: #94A3B8;
      --text-on-accent: #FFFFFF;

      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --border-accent: rgba(37, 99, 235, 0.25);

      --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,.06), 0 2px 6px rgba(37,99,235,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;

      --font-mono: "JetBrains Mono","Cascadia Code","Fira Code","Consolas","Monaco",monospace;
      --font-sans: system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC","Segoe UI",sans-serif;
      --transition: 200ms ease;
      --transition-slow: 350ms ease;
    }

    /* Dark */

      :root {
        --accent: #3B82F6;
        --accent-hover: #60A5FA;
        --accent-soft: #1E293B;
        --accent-glow: rgba(59, 130, 246, 0.18);
        --gradient-accent: linear-gradient(135deg, #3B82F6, #8B5CF6);
        --gradient-subtle: linear-gradient(135deg, #0B1121, #0F172A, #0B1121);

        --bg-primary: #0A0F1A;
        --bg-secondary: #111827;
        --bg-raised: #151D2B;
        --bg-code: #0D1520;
        --bg-glass: rgba(17,24,39,0.78);

        --text-primary: #F1F5F9;
        --text-secondary: #94A3B8;
        --text-tertiary: #64748B;

        --border: #1E293B;
        --border-light: #162032;
        --border-accent: rgba(59, 130, 246, 0.3);

        --shadow-card: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.15);
        --shadow-card-hover: 0 4px 20px rgba(0,0,0,.3), 0 2px 8px rgba(59,130,246,.12);
        --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.2);
      }

    /* ---------- Reset ---------- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{
      font-family:var(--font-sans);
      font-size:1rem;line-height:1.75;
      color:var(--text-primary);
      background:var(--bg-primary);
      min-height:100dvh;display:flex;flex-direction:column;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      transition:background var(--transition-slow),color var(--transition-slow);
    }

    /* ---------- Background texture ---------- */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, var(--accent-glow), transparent),
        radial-gradient(ellipse 50% 50% at 80% 80%, var(--accent-glow), transparent);
    }

    /* Subtle grid overlay (dark only) */
    @media (prefers-color-scheme: dark) {
      body::after {
        content: "";
        position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .03;
        background-image:
          linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }
    }

    /* ---------- Layout ---------- */
    .container{width:100%;max-width:920px;margin:0 auto;padding:0 1.5rem}

    /* ---------- Header ---------- */
    .site-header{
      position:sticky;top:0;z-index:100;
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      background:var(--bg-glass);
      border-bottom:1px solid var(--border-light);
      transition:all var(--transition);
    }
    .site-header .container{
      display:flex;align-items:center;justify-content:space-between;height:58px;
    }
    .site-brand{
      font-family:var(--font-mono);font-size:1.05rem;font-weight:700;
      color:var(--text-primary);text-decoration:none;letter-spacing:-.02em;
      display:flex;align-items:center;gap:.5rem;
    }
    .site-brand::before{
      content:">";color:var(--accent);font-weight:700;font-size:1.3rem;
      text-shadow:0 0 10px var(--accent-glow);
    }
    .site-nav{display:flex;align-items:center;gap:.25rem}
    .site-nav a{
      font-size:.85rem;font-weight:500;color:var(--text-secondary);
      text-decoration:none;padding:.45rem .85rem;border-radius:var(--radius-sm);
      transition:all var(--transition);position:relative;
    }
    .site-nav a:hover{color:var(--text-primary);background:var(--accent-soft)}
    .site-nav a.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
    .site-nav a.active::after{
      content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
      width:16px;height:2px;background:var(--accent);border-radius:1px;
    }

    /* ---------- Main ---------- */
    .site-main{flex:1;padding:3rem 0 5rem}

    /* ---------- Page Header ---------- */
    .page-header{
      margin-bottom:2.5rem;padding-bottom:1.5rem;
      border-bottom:1px solid var(--border-light);position:relative;
    }
    .page-header::after{
      content:"";display:block;width:48px;height:3px;
      background:var(--gradient-accent);border-radius:2px;margin-top:1.25rem;
    }
    .page-header h1{
      font-family:var(--font-mono);font-size:1.85rem;font-weight:700;
      color:var(--text-primary);letter-spacing:-.03em;line-height:1.3;
    }
    .page-subtitle{
      font-size:1.05rem;font-weight:500;color:var(--text-secondary);
      margin-top:.5rem;font-family:var(--font-mono);
    }
    .page-subtitle strong{
      font-weight:800;font-size:1.25em;
      background:var(--gradient-accent);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* ---------- Post Cards ---------- */
    .post-list{display:flex;flex-direction:column;gap:1.25rem}
    .post-card{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:1.6rem 1.85rem;
      transition:all var(--transition);
      position:relative;overflow:hidden;
      box-shadow:var(--shadow-card);
    }
    /* Top glow line */
    .post-card::before{
      content:"";position:absolute;top:0;left:20px;right:20px;height:1px;
      background:var(--gradient-accent);opacity:0;
      transition:opacity var(--transition);
    }
    /* Left accent bar */
    .post-card::after{
      content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;
      background:var(--gradient-accent);border-radius:0 2px 2px 0;
      opacity:0;transform:scaleY(.5);
      transition:all var(--transition);
    }
    .post-card:hover{
      border-color:var(--border-accent);
      box-shadow:var(--shadow-card-hover);
      transform:translateY(-2px);
    }
    .post-card:hover::before{opacity:1}
    .post-card:hover::after{opacity:1;transform:scaleY(1)}

    .post-card time{
      display:inline-flex;align-items:center;gap:.35rem;
      font-family:var(--font-mono);font-size:.78rem;color:var(--text-tertiary);
      margin-bottom:.5rem;letter-spacing:.02em;
    }
    .post-card time::before{
      content:"";display:inline-block;width:6px;height:6px;
      background:var(--accent);border-radius:50%;
    }
    .post-card h2{font-size:1.25rem;font-weight:700;line-height:1.4;margin-bottom:.5rem}
    .post-card h2 a{color:var(--text-primary);text-decoration:none;transition:color var(--transition)}
    .post-card h2 a:hover{color:var(--accent)}
    .post-card .summary{font-size:.9rem;color:var(--text-secondary);line-height:1.7;margin-bottom:.85rem}
    .post-card .read-more{
      font-family:var(--font-mono);font-size:.78rem;font-weight:600;
      color:var(--accent);text-decoration:none;
      display:inline-flex;align-items:center;gap:.35rem;
      transition:gap var(--transition);
    }
    .post-card .read-more::after{content:"→";transition:transform var(--transition)}
    .post-card:hover .read-more{gap:.55rem}
    .post-card:hover .read-more::after{transform:translateX(2px)}

    /* ---------- Tech tags (optional flair) ---------- */
    .post-card .meta-tags{
      display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.25rem;
    }
    .post-card .meta-tags span{
      font-family:var(--font-mono);font-size:.68rem;font-weight:500;
      padding:.15rem .55rem;border-radius:99px;
      background:var(--accent-soft);color:var(--accent);
      border:1px solid var(--border-accent);
    }

    /* ---------- Article Detail ---------- */
    .article-header{margin-bottom:2rem}
    .article-header time{
      display:inline-flex;align-items:center;gap:.4rem;
      font-family:var(--font-mono);font-size:.82rem;color:var(--text-tertiary);
      margin-bottom:.75rem;
    }
    .article-header time::before{
      content:"";display:inline-block;width:7px;height:7px;
      background:var(--accent);border-radius:50%;
      box-shadow:0 0 8px var(--accent-glow);
    }
    .article-header h1{
      font-family:var(--font-mono);font-size:2rem;font-weight:700;
      line-height:1.3;letter-spacing:-.03em;color:var(--text-primary);margin-bottom:.75rem;
    }
    .article-meta{
      display:flex;flex-wrap:wrap;gap:1rem;align-items:center;
      font-size:.85rem;color:var(--text-secondary);
    }
    .article-meta .authors{
      display:flex;align-items:center;gap:.35rem;
    }
    .article-meta .authors::before{
      content:"@";color:var(--accent);font-family:var(--font-mono);font-weight:600;
    }

    /* ---------- Article Body ---------- */
    .article-body{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:2.25rem 2.25rem;
      line-height:1.85;font-size:1rem;
      box-shadow:var(--shadow-card);
    }
    /* 锚点跳转偏移（避免被 sticky header 遮挡） */
    .article-body h2[id],.article-body h3[id],.article-body h4[id],
    .article-body h5[id],.article-body h6[id]{
      scroll-margin-top:80px;
    }
    .article-body > * + *{margin-top:1.25rem}
    .article-body h2{
      font-family:var(--font-mono);font-size:1.35rem;font-weight:700;
      color:var(--text-primary);margin-top:2.5rem;padding-bottom:.55rem;
      border-bottom:1px solid var(--border-light);letter-spacing:-.02em;
      position:relative;
    }
    .article-body h2::after{
      content:"";display:block;width:32px;height:3px;
      background:var(--gradient-accent);border-radius:2px;margin-top:.55rem;
    }
    .article-body h3{
      font-family:var(--font-mono);font-size:1.1rem;font-weight:600;
      color:var(--text-primary);margin-top:1.85rem;
    }
    .article-body h4,.article-body h5,.article-body h6{
      font-weight:600;color:var(--text-primary);margin-top:1.5rem;
    }
    .article-body p{margin-top:.85rem;color:var(--text-primary)}
    .article-body a{
      color:var(--accent);text-decoration:none;font-weight:500;
      background:linear-gradient(var(--accent),var(--accent)) 0 100% / 0 1px no-repeat;
      transition:background-size var(--transition);
      padding-bottom:1px;
    }
    .article-body a:hover{background-size:100% 1px}
    .article-body ul,.article-body ol{padding-left:1.5rem}
    .article-body li{margin-top:.4rem}
    .article-body li::marker{color:var(--accent)}
    .article-body blockquote{
      border-left:3px solid var(--accent);
      padding:.85rem 1.35rem;margin:1.5rem 0;
      background:var(--accent-soft);
      border-radius:0 var(--radius) var(--radius) 0;
      color:var(--text-secondary);font-style:italic;
      position:relative;
    }
    .article-body blockquote::before{
      content:"\201C";position:absolute;top:-8px;left:8px;
      font-size:2.5rem;color:var(--accent);opacity:.2;
      font-family:Georgia,serif;line-height:1;
    }
    .article-body hr{
      border:none;border-top:1px solid var(--border-light);margin:2rem 0;
      position:relative;overflow:visible;
    }
    .article-body hr::after{
      content:"*  *  *";position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);background:var(--bg-secondary);
      padding:0 1rem;font-family:var(--font-mono);font-size:.7rem;
      color:var(--text-tertiary);letter-spacing:.3em;
    }

    /* Code */
    .article-body pre{
      background:var(--bg-code);border:1px solid var(--border);
      border-radius:var(--radius);padding:1.35rem 1.6rem;overflow-x:auto;
      font-family:var(--font-mono);font-size:.85rem;line-height:1.7;
      margin:1.35rem 0;position:relative;
    }
    /* Pseudo title bar on code blocks */
    .article-body pre::before{
      content:"";
      display:block;position:absolute;top:.65rem;left:1rem;
    }
    .article-body code{
      font-family:var(--font-mono);font-size:.88em;
      background:var(--accent-soft);color:var(--accent);
      padding:.15em .45em;border-radius:4px;
      border:1px solid var(--border-accent);
    }
    .article-body pre code{
      background:none;padding:0;border:none;color:var(--text-primary);font-size:.85rem;
    }

    /* Tables */
    .article-body table{
      width:100%;border-collapse:collapse;margin:1.35rem 0;font-size:.9rem;
      border-radius:var(--radius);overflow:hidden;
      border:1px solid var(--border);
    }
    .article-body thead{background:var(--bg-code)}
    .article-body th{
      font-family:var(--font-mono);font-weight:600;text-align:left;
      padding:.7rem .9rem;border-bottom:2px solid var(--accent);
      color:var(--text-primary);font-size:.78rem;
      text-transform:uppercase;letter-spacing:.05em;
    }
    .article-body td{padding:.6rem .9rem;border-bottom:1px solid var(--border-light)}
    .article-body tr:last-child td{border-bottom:none}
    .article-body tbody tr:hover td{background:var(--accent-soft)}
    .article-body img{display:block;max-width:100%;height:auto;border-radius:var(--radius);margin:1.35rem auto}

    /* ---------- Pagination ---------- */
    .pagination{
      display:flex;align-items:center;justify-content:center;gap:1rem;
      margin-top:3rem;padding:1.25rem 0;
    }
    .pagination a{
      font-family:var(--font-mono);font-size:.82rem;font-weight:600;
      color:var(--accent);text-decoration:none;
      padding:.55rem 1.15rem;
      border:1px solid var(--border);border-radius:var(--radius);
      background:var(--bg-secondary);
      box-shadow:var(--shadow-card);
      transition:all var(--transition);
      display:inline-flex;align-items:center;gap:.35rem;
    }
    .pagination a:hover{
      background:var(--accent);color:#fff;
      border-color:var(--accent);box-shadow:var(--shadow-card-hover);
      transform:translateY(-1px);
    }
    .pagination span{
      font-family:var(--font-mono);font-size:.82rem;color:var(--text-tertiary);
      padding:.5rem .75rem;
    }

    /* ---------- Archives ---------- */
    .archive-year{
      display:flex;align-items:center;gap:.85rem;
      margin:2.5rem 0 .85rem;padding:.4rem 0;
      font-family:var(--font-mono);
      position:relative;
    }
    /* 年份数字 — 渐变色大字 */
    .archive-year .year-num{
      font-size:1.5rem;font-weight:800;
      background:var(--gradient-accent);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:-.04em;line-height:1;flex-shrink:0;
    }
    /* 年份右侧渐变分隔线 */
    .archive-year::after{
      content:"";flex:1;height:1px;
      background:linear-gradient(to right,var(--border),transparent);
      border-radius:1px;
    }
    /* 篇数徽章 */
    .archive-year .year-count{
      font-size:.78rem;font-weight:600;color:var(--text-tertiary);
      background:var(--bg-code);padding:.2rem .75rem;border-radius:99px;
      border:1px solid var(--border);
      white-space:nowrap;flex-shrink:0;letter-spacing:0;
    }
    .archive-list{list-style:none;display:flex;flex-direction:column;gap:.15rem}
    .archive-list li{
      display:flex;align-items:baseline;gap:1.2rem;
      padding:.58rem 1rem;border-radius:var(--radius);
      transition:all var(--transition);
      border:1px solid transparent;
    }
    .archive-list li:hover{
      background:var(--bg-secondary);border-color:var(--border);
      box-shadow:var(--shadow-card);
    }
    .archive-list time{
      font-family:var(--font-mono);font-size:.78rem;color:var(--text-tertiary);
      white-space:nowrap;min-width:6em;
    }
    .archive-list a{
      color:var(--text-primary);text-decoration:none;font-weight:500;
      transition:color var(--transition);flex:1;
    }
    .archive-list a:hover{color:var(--accent)}

    /* ---------- 404 ---------- */
    .error-page{text-align:center;padding:5rem 0}
    .error-page .error-code{
      font-family:var(--font-mono);font-size:6rem;font-weight:800;
      background:var(--gradient-accent);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1;margin-bottom:1rem;letter-spacing:-.04em;
    }
    .error-page h1{font-size:1.5rem;margin-bottom:.75rem}
    .error-page p{color:var(--text-secondary);margin-bottom:2.25rem}
    .error-page a{
      font-family:var(--font-mono);font-weight:600;font-size:.88rem;
      color:#fff;text-decoration:none;
      padding:.65rem 1.75rem;
      background:var(--accent);border-radius:var(--radius);
      transition:all var(--transition);
      box-shadow:0 2px 8px var(--accent-glow);
    }
    .error-page a:hover{
      background:var(--accent-hover);
      box-shadow:0 4px 16px var(--accent-glow);
      transform:translateY(-1px);
    }

    /* ---------- Empty State ---------- */
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--text-tertiary)}
    .empty-state .empty-icon{
      font-family:var(--font-mono);font-size:3rem;margin-bottom:1rem;opacity:.35;
    }
    .empty-state p{font-family:var(--font-mono);font-size:.85rem}

    /* ---------- Footer ---------- */
    .site-footer{
      border-top:1px solid var(--border-light);padding:2rem 0;text-align:center;
      font-size:.78rem;color:var(--text-tertiary);font-family:var(--font-mono);
    }
    .site-footer .footer-row{
      display:flex;align-items:center;justify-content:space-between;
      gap:1rem;flex-wrap:wrap;
    }
    .site-footer .footer-dot{
      display:inline-block;width:4px;height:4px;
      background:var(--accent);border-radius:50%;
      margin:0 .4rem;vertical-align:middle;
    }
    .site-footer .footer-publish{
      font-family:var(--font-mono);font-size:.76rem;font-weight:600;
      color:var(--text-tertiary);text-decoration:none;
      padding:.35rem .7rem;border:1px solid var(--border);
      border-radius:99px;transition:all var(--transition);
      display:inline-flex;align-items:center;gap:.3rem;
    }
    .site-footer .footer-publish::before{
      content:"+";font-size:.9rem;line-height:1;color:var(--accent);
    }
    .site-footer .footer-publish:hover{
      color:var(--accent);border-color:var(--accent);background:var(--accent-soft);
    }
    @media (max-width:640px){
      .site-footer .footer-row{justify-content:center;text-align:center}
    }

    /* ---------- Scrollbar ---------- */
    @media (prefers-color-scheme: dark) {
      ::-webkit-scrollbar{width:6px;height:6px}
      ::-webkit-scrollbar-track{background:var(--bg-primary)}
      ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
      ::-webkit-scrollbar-thumb:hover{background:#475569}
    }

    /* ---------- A11y ---------- */
    :focus-visible{
      outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }

    /* ---------- Back to Top ---------- */
    .back-to-top{
      position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
      width:44px;height:44px;border-radius:50%;border:none;
      background:var(--accent);color:#fff;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(37,99,235,.35);
      opacity:0;visibility:hidden;transform:translateY(8px) scale(.9);
      transition:all 250ms cubic-bezier(.4,0,.2,1);
    }
    .back-to-top.visible{
      opacity:1;visibility:visible;transform:translateY(0) scale(1);
    }
    .back-to-top:hover{
      background:var(--accent-hover);
      box-shadow:0 6px 20px rgba(37,99,235,.45);
      transform:translateY(-2px) scale(1.05);
    }
    .back-to-top:active{transform:scale(.92)}
    .back-to-top svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

    /* ---------- TOC Sidebar ---------- */
    .toc-sidebar{
      position:fixed;top:59px;left:15%;bottom:0;z-index:80;width: 300px;
      background:var(--bg-glass);backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      border-right:1px solid var(--border-light);
      transform:translateX(-100%);transition:transform 300ms cubic-bezier(.4,0,.2,1);
      overflow-y:auto;overscroll-behavior:contain;
    }
    .toc-sidebar.open{transform:translateX(0)}
    .toc-inner{padding:1rem .75rem 2rem}
    .toc-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 .5rem .85rem;margin-bottom:.25rem;
      border-bottom:1px solid var(--border-light);
    }
    .toc-title{
      font-family:var(--font-mono);font-size:.68rem;font-weight:600;
      color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.1em;
    }
    .toc-close{
      display:none;width:32px;height:32px;border-radius:var(--radius-sm);
      border:1px solid var(--border);background:var(--bg-secondary);
      color:var(--text-tertiary);cursor:pointer;
      align-items:center;justify-content:center;transition:all var(--transition);
    }
    .toc-close:hover{color:var(--accent);border-color:var(--accent)}
    .toc-close svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
    .toc-list{list-style:none;display:flex;flex-direction:column;gap:.1rem}
    .toc-item a{
      display:block;font-size:.82rem;color:var(--text-secondary);
      text-decoration:none;padding:.5rem .65rem;border-radius:var(--radius-sm);
      border-left:2px solid transparent;
      transition:all var(--transition);line-height:1.5;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .toc-item a:hover{color:var(--text-primary);background:var(--accent-soft)}
    .toc-item a:active{background:var(--accent-soft);opacity:.8}
    .toc-item.toc-level-3 a{padding-left:1.15rem;font-size:.78rem}
    .toc-item.toc-level-4 a{padding-left:1.7rem;font-size:.76rem}
    .toc-item.toc-level-5 a{padding-left:2.25rem;font-size:.74rem}
    .toc-item.toc-level-6 a{padding-left:2.8rem;font-size:.74rem}
    .toc-item a.active{
      color:var(--accent);border-left-color:var(--accent);
      background:var(--accent-soft);font-weight:600;
    }

    /* TOC 阅读进度条 */
    .toc-progress{
      height:2px;background:var(--gradient-accent);
      border-radius:1px;width:0%;transition:width 80ms linear;
      margin-bottom:.85rem;
    }

    /* TOC 移动端蒙层 */
    .toc-backdrop{
      display:none;position:fixed;inset:0;top:59px;z-index:79;
      background:rgba(0,0,0,.25);backdrop-filter:blur(2px);
      opacity:0;transition:opacity 300ms ease;
    }
    .toc-backdrop.visible{display:block;opacity:1}

    /* TOC toggle button (mobile) */
    .toc-toggle{
      display:none;position:fixed;top:72px;left:15%;z-index:85;
      width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
      background:var(--bg-raised);color:var(--text-tertiary);
      cursor:pointer;align-items:center;justify-content:center;
      box-shadow:var(--shadow-card);transition:all var(--transition);
    }
    .toc-toggle:hover{color:var(--accent);border-color:var(--accent)}
    .toc-toggle:active{transform:scale(.95)}
    .has-toc .toc-toggle{display:flex}

    @media (min-width:1024px){
      .site-main{padding:3.5rem 0 5rem}
      .article-body{padding:2.5rem 3rem}
      .toc-sidebar{transform:translateX(0)!important}
      .has-toc .container{max-width:920px;margin-left:calc(15% + 300px);margin-right:auto}
      .toc-toggle{display:none!important}
      .toc-backdrop{display:none!important}
      .toc-close{display:none!important}
    }

    /* ---------- Responsive ---------- */
    /* Mobile readable responsive overrides: keep desktop styles unchanged. */
    @media (max-width:640px){
      html{font-size:16px}
      body{overflow-x:hidden}
      .container{padding:0 clamp(.85rem,4vw,1rem);max-width:100%;min-width:0}
      .site-header{overflow:hidden}
      .site-header .container{min-width:0;
        height:auto;min-height:52px;gap:.55rem;padding-top:.35rem;padding-bottom:.35rem;
      }
      .site-brand{font-size:.9rem;white-space:nowrap;flex-shrink:0;min-width:0}
      .site-nav{min-width:0;flex:1;
        gap:.15rem;overflow-x:auto;overscroll-behavior-x:contain;
        scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:manipulation;
        max-width:100%;padding:.1rem 0;
      }
      .site-nav::-webkit-scrollbar{display:none}
      .site-nav a{
        min-height:38px;display:inline-flex;align-items:center;justify-content:center;
        font-size:.78rem;padding:.35rem .58rem;white-space:nowrap;flex:0 0 auto;
      }
      .site-main{padding:1.9rem 0 3.5rem;overflow-x:hidden}
      .page-header{margin-bottom:1.6rem;padding-bottom:1rem}
      .page-header::after{width:40px;margin-top:.9rem}
      .page-header h1{font-size:clamp(1.35rem,7vw,1.55rem);line-height:1.28}
      .page-subtitle{font-size:.9rem;line-height:1.7}
      .page-subtitle strong{font-size:1.15em}

      .post-list{gap:1rem;max-width:92%;min-width:0}
      .post-card{max-width:100%;min-width:0;padding:1.1rem 1rem;border-radius:var(--radius)}
      .post-card:hover{transform:none}
      .post-card::before{left:12px;right:12px}
      .post-card::after{left:1px;width:2px;top:14px;bottom:14px}
      .post-card h2{font-size:1.08rem;line-height:1.45;margin-bottom:.45rem;overflow-wrap:anywhere}
      .post-card .summary{font-size:.9rem;line-height:1.72;margin-bottom:.75rem;overflow-wrap:anywhere}
      .post-card .read-more{min-height:38px;padding:.2rem 0;touch-action:manipulation}

      article,.article-header,.article-body{max-width:100%;min-width:0}
      .article-header{margin-bottom:1.35rem;overflow-wrap:anywhere}
      .article-header h1{font-size:clamp(1.35rem,7vw,1.62rem);line-height:1.35;overflow-wrap:anywhere}
      .article-meta{font-size:.82rem;gap:.55rem}
      .article-body{
        padding:1.15rem 1rem;font-size:.96rem;line-height:1.82;border-radius:var(--radius);
        overflow-wrap:anywhere;word-break:break-word;
      }
      .article-body > * + *{margin-top:1rem}
      .article-body h2{font-size:1.15rem;line-height:1.45;margin-top:2rem;padding-bottom:.45rem}
      .article-body h3{font-size:1.03rem;line-height:1.5;margin-top:1.55rem}
      .article-body ul,.article-body ol{padding-left:1.15rem}
      .article-body blockquote{padding:.75rem 1rem;margin:1.25rem 0}
      .article-body pre,
      .highlight{
        max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;
        padding:1rem .85rem;font-size:.78rem;margin-left:-.35rem;margin-right:-.35rem;
        border-radius:var(--radius-sm);
      }
      .article-body pre code,
      .highlight code{white-space:pre;word-break:normal;overflow-wrap:normal}
      .article-body table{
        display:block;width:100%;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;
        white-space:nowrap;font-size:.82rem;
      }
      .article-body th,.article-body td{padding:.55rem .7rem}
      .article-body img{max-width:100%;height:auto;margin:1.1rem auto}
      .article-body iframe,
      .article-body video{max-width:100%;height:auto}

      .pagination{justify-content:space-between;gap:.5rem;margin-top:2rem;padding:.8rem 0}
      .pagination a{
        min-height:42px;padding:.5rem .75rem;font-size:.76rem;justify-content:center;touch-action:manipulation;
      }
      .pagination span{font-size:.76rem;padding:.4rem .35rem;text-align:center}

      .archive-year{margin:2rem 0 .6rem;gap:.5rem}
      .archive-year .year-num{font-size:1.2rem}
      .archive-list{gap:.35rem}
      .archive-list li{flex-direction:column;align-items:flex-start;gap:.15rem;padding:.65rem .75rem}
      .archive-list time{min-width:0;font-size:.75rem}
      .archive-list a{line-height:1.55;overflow-wrap:anywhere}

      .error-page{padding:3rem 0}
      .error-page .error-code{font-size:4rem}
      .error-page h1{font-size:1.25rem}
      .error-page a{display:inline-flex;align-items:center;min-height:44px}
      .empty-state{padding:3rem .5rem}
      .empty-state .empty-icon{font-size:1.5rem;overflow-wrap:anywhere}

      .site-footer{padding:1.5rem 0 calc(1.5rem + env(safe-area-inset-bottom))}
      .site-footer .footer-row{justify-content:center;text-align:center;gap:.75rem}
      .site-footer .footer-publish{min-height:38px;padding:.4rem .8rem;touch-action:manipulation}
      .back-to-top{right:1rem;bottom:calc(1rem + env(safe-area-inset-bottom));width:42px;height:42px}

      /* 移动端 header 约 52px，目录抽屉跟随顶部栏 */
      .toc-sidebar{
        top:52px;left:0;width:min(86vw, 320px);max-width:320px;
        transform:translateX(-105%);
      }
      .toc-backdrop{top:52px}
      .toc-toggle{
        top:calc(64px + env(safe-area-inset-top));left:clamp(.85rem,4vw,1rem);
        width:44px;height:44px;touch-action:manipulation;
      }
      .toc-close{display:flex;min-width:36px;min-height:36px;touch-action:manipulation}
      .toc-item a{min-height:40px;display:flex;align-items:center}
    }

    @media (min-width:641px) and (max-width:1023px){
      .container{max-width:760px;padding:0 1.25rem}
      .site-main{padding:2.5rem 0 4rem}
      .toc-sidebar{left:0;width:min(40vw, 320px);max-width:320px}
      .toc-toggle{left:1.25rem;touch-action:manipulation}
      .toc-close{display:flex}
    }

    /* Larger screens — subtle layout enhancement */
    @media (min-width:1024px){
      .site-main{padding:3.5rem 0 5rem}
      .article-body{padding:2.5rem 3rem}
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-brand">随笔记录</a>
      <nav class="site-nav">
        <a href="/" {% if request.path == "/" %}class="active"{% endif %}>首页</a>
        <a href="/archives.html" {% if request.path == "/archives.html" %}class="active"{% endif %}>归档</a>
        <a href="/topic/about.html" {% if request.path == "/topic/about.html" %}class="active"{% endif %}>关于</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>随笔记录<span class="footer-dot"></span>互联网开发 · 前端 · 后端 · AI</span>
      {% if postart_enabled %}
      <a class="footer-publish" href="{{ url_for('postart.postart') }}">发布文章</a>
      {% endif %}
    </div>
  </footer>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" aria-label="返回顶部" title="返回顶部">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script>
    (function () {
      /* ---------- 返回顶部 ---------- */
      const topBtn = document.getElementById("backToTop");
      if (topBtn) {
        const toggleTop = () => {
          topBtn.classList.toggle("visible", window.scrollY > 200);
        };
        topBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
        window.addEventListener("scroll", toggleTop, { passive: true });
        toggleTop();
      }

      /* ---------- 目录（TOC）---------- */
      const toc = document.getElementById("tocSidebar");
      const main = document.querySelector(".site-main");
      if (!toc || !main) return;

      // 标记页面有目录，用于 CSS 布局
      main.classList.add("has-toc");

      const tocToggle = document.getElementById("tocToggle");
      const tocBackdrop = document.getElementById("tocBackdrop");
      const tocClose = document.getElementById("tocClose");
      const tocProgress = document.getElementById("tocProgress");
      const isMobile = () => window.innerWidth < 1024;

      // 打开 / 关闭目录
      const openToc = () => {
        toc.classList.add("open");
        if (tocBackdrop) tocBackdrop.classList.add("visible");
        document.body.style.overflow = "hidden";
      };
      const closeToc = () => {
        toc.classList.remove("open");
        if (tocBackdrop) tocBackdrop.classList.remove("visible");
        document.body.style.overflow = "";
      };

      if (tocToggle) tocToggle.addEventListener("click", () => {
        toc.classList.contains("open") ? closeToc() : openToc();
      });
      if (tocClose) tocClose.addEventListener("click", closeToc);
      if (tocBackdrop) tocBackdrop.addEventListener("click", closeToc);

      // 点击目录链接后自动收起（移动端）
      toc.querySelectorAll(".toc-item a").forEach(link => {
        link.addEventListener("click", (e) => {
          const slug = link.dataset.slug;
          if (!slug) return;
          const target = document.getElementById(slug);
          if (!target) return;

          // 平滑滚动到锚点，考虑 sticky header 高度
          e.preventDefault();
          const headerOffset = 80;
          const elementPosition = target.getBoundingClientRect().top + window.pageYOffset;
          const offsetPosition = elementPosition - headerOffset;

          window.scrollTo({ top: offsetPosition, behavior: "smooth" });

          // 更新 URL hash 但不跳转
          if (history.replaceState) history.replaceState(null, null, `#${slug}`);

          if (isMobile()) closeToc();
        });
      });

      // ESC 关闭
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && toc.classList.contains("open")) closeToc();
      });

      // 阅读进度条
      function updateProgress() {
        if (!tocProgress) return;
        const headings = toc.querySelectorAll(".toc-item a[data-slug]");
        if (headings.length === 0) return;
        const slugs = Array.from(headings).map(a => a.dataset.slug);
        const firstHeading = document.getElementById(slugs[0]);
        const lastHeading = document.getElementById(slugs[slugs.length - 1]);
        if (!firstHeading || !lastHeading) return;

        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const startOffset = firstHeading.getBoundingClientRect().top + scrollTop - 120;
        const endOffset = lastHeading.getBoundingClientRect().top + scrollTop - 120;

        if (scrollTop <= startOffset) {
          tocProgress.style.width = "0%";
        } else if (scrollTop >= endOffset) {
          tocProgress.style.width = "100%";
        } else {
          const progress = ((scrollTop - startOffset) / (endOffset - startOffset)) * 100;
          tocProgress.style.width = `${Math.min(100, Math.max(0, progress))}%`;
        }
      }

      // ScrollSpy：用 IntersectionObserver 高亮当前章节
      const tocLinks = toc.querySelectorAll(".toc-item a[data-slug]");
      if (tocLinks.length > 0) {
        const slugs = Array.from(tocLinks).map(a => a.dataset.slug);
        const sections = slugs.map(slug => {
          const el = document.getElementById(slug);
          return el ? { slug, el } : null;
        }).filter(Boolean);

        if (sections.length > 0 && "IntersectionObserver" in window) {
          const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              const link = toc.querySelector(`.toc-item a[data-slug="${entry.target.id}"]`);
              if (!link) return;
              if (entry.isIntersecting) {
                tocLinks.forEach(l => l.classList.remove("active"));
                link.classList.add("active");
              }
            });
          }, { rootMargin: "0px 0px -55% 0px", threshold: 0 });

          sections.forEach(({ el }) => observer.observe(el));
        }
      }

      // 统一滚动处理
      let ticking = false;
      window.addEventListener("scroll", () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            updateProgress();
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      updateProgress();
    })();
  </script>
</body>
</html>
