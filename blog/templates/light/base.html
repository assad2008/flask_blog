<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}随笔记录{% endblock %}</title>
  <style>
    /* ============================================
       Design System — Tech Blog
       Style: Glass + Gradient accents
       Accent: Blue (#2563EB light / #3B82F6 dark)
       Fonts: JetBrains Mono + System UI
       ============================================ */

    /* ---------- Tokens ---------- */
    :root {
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-soft: #DBEAFE;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --gradient-accent: linear-gradient(135deg, #2563EB, #7C3AED);
      --gradient-subtle: linear-gradient(135deg, #EEF2FF, #F8FAFC, #F0F9FF);

      --bg-primary: #F8FAFC;
      --bg-secondary: #FFFFFF;
      --bg-raised: #FFFFFF;
      --bg-code: #F1F5F9;
      --bg-glass: rgba(255,255,255,0.72);

      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-tertiary: #94A3B8;
      --text-on-accent: #FFFFFF;

      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --border-accent: rgba(37, 99, 235, 0.25);

      --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,.06), 0 2px 6px rgba(37,99,235,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;

      --font-mono: "JetBrains Mono","Cascadia Code","Fira Code","Consolas","Monaco",monospace;
      --font-sans: system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC","Segoe UI",sans-serif;
      --transition: 200ms ease;
      --transition-slow: 350ms ease;
    }

    /* Dark */
    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #3B82F6;
        --accent-hover: #60A5FA;
        --accent-soft: #1E293B;
        --accent-glow: rgba(59, 130, 246, 0.18);
        --gradient-accent: linear-gradient(135deg, #3B82F6, #8B5CF6);
        --gradient-subtle: linear-gradient(135deg, #0B1121, #0F172A, #0B1121);

        --bg-primary: #0A0F1A;
        --bg-secondary: #111827;
        --bg-raised: #151D2B;
        --bg-code: #0D1520;
        --bg-glass: rgba(17,24,39,0.78);

        --text-primary: #F1F5F9;
        --text-secondary: #94A3B8;
        --text-tertiary: #64748B;

        --border: #1E293B;
        --border-light: #162032;
        --border-accent: rgba(59, 130, 246, 0.3);

        --shadow-card: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.15);
        --shadow-card-hover: 0 4px 20px rgba(0,0,0,.3), 0 2px 8px rgba(59,130,246,.12);
        --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.2);
      }
    }

    /* ---------- Reset ---------- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{
      font-family:var(--font-sans);
      font-size:1rem;line-height:1.75;
      color:var(--text-primary);
      background:var(--bg-primary);
      min-height:100dvh;display:flex;flex-direction:column;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      transition:background var(--transition-slow),color var(--transition-slow);
    }

    /* ---------- Background texture ---------- */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, var(--accent-glow), transparent),
        radial-gradient(ellipse 50% 50% at 80% 80%, var(--accent-glow), transparent);
    }

    /* Subtle grid overlay (dark only) */
    @media (prefers-color-scheme: dark) {
      body::after {
        content: "";
        position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .03;
        background-image:
          linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }
    }

    /* ---------- Layout ---------- */
    .container{width:100%;max-width:920px;margin:0 auto;padding:0 1.5rem}

    /* ---------- Header ---------- */
    .site-header{
      position:sticky;top:0;z-index:100;
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      background:var(--bg-glass);
      border-bottom:1px solid var(--border-light);
      transition:all var(--transition);
    }
    .site-header .container{
      display:flex;align-items:center;justify-content:space-between;height:58px;
    }
    .site-brand{
      font-family:var(--font-mono);font-size:1.05rem;font-weight:700;
      color:var(--text-primary);text-decoration:none;letter-spacing:-.02em;
      display:flex;align-items:center;gap:.5rem;
    }
    .site-brand::before{
      content:">";color:var(--accent);font-weight:700;font-size:1.3rem;
      text-shadow:0 0 10px var(--accent-glow);
    }
    .site-nav{display:flex;align-items:center;gap:.25rem}
    .site-nav a{
      font-size:.85rem;font-weight:500;color:var(--text-secondary);
      text-decoration:none;padding:.45rem .85rem;border-radius:var(--radius-sm);
      transition:all var(--transition);position:relative;
    }
    .site-nav a:hover{color:var(--text-primary);background:var(--accent-soft)}
    .site-nav a.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
    .site-nav a.active::after{
      content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
      width:16px;height:2px;background:var(--accent);border-radius:1px;
    }

    /* ---------- Main ---------- */
    .site-main{flex:1;padding:3rem 0 5rem}

    /* ---------- Page Header ---------- */
    .page-header{
      margin-bottom:2.5rem;padding-bottom:1.5rem;
      border-bottom:1px solid var(--border-light);position:relative;
    }
    .page-header::after{
      content:"";display:block;width:48px;height:3px;
      background:var(--gradient-accent);border-radius:2px;margin-top:1.25rem;
    }
    .page-header h1{
      font-family:var(--font-mono);font-size:1.85rem;font-weight:700;
      color:var(--text-primary);letter-spacing:-.03em;line-height:1.3;
    }
    .page-subtitle{
      font-size:.9rem;color:var(--text-tertiary);margin-top:.35rem;
      font-family:var(--font-mono);font-size:.8rem;
    }

    /* ---------- Post Cards ---------- */
    .post-list{display:flex;flex-direction:column;gap:1.25rem}
    .post-card{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:1.6rem 1.85rem;
      transition:all var(--transition);
      position:relative;overflow:hidden;
      box-shadow:var(--shadow-card);
    }
    /* Top glow line */
    .post-card::before{
      content:"";position:absolute;top:0;left:20px;right:20px;height:1px;
      background:var(--gradient-accent);opacity:0;
      transition:opacity var(--transition);
    }
    /* Left accent bar */
    .post-card::after{
      content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;
      background:var(--gradient-accent);border-radius:0 2px 2px 0;
      opacity:0;transform:scaleY(.5);
      transition:all var(--transition);
    }
    .post-card:hover{
      border-color:var(--border-accent);
      box-shadow:var(--shadow-card-hover);
      transform:translateY(-2px);
    }
    .post-card:hover::before{opacity:1}
    .post-card:hover::after{opacity:1;transform:scaleY(1)}

    .post-card time{
      display:inline-flex;align-items:center;gap:.35rem;
      font-family:var(--font-mono);font-size:.78rem;color:var(--text-tertiary);
      margin-bottom:.5rem;letter-spacing:.02em;
    }
    .post-card time::before{
      content:"";display:inline-block;width:6px;height:6px;
      background:var(--accent);border-radius:50%;
    }
    .post-card h2{font-size:1.25rem;font-weight:700;line-height:1.4;margin-bottom:.5rem}
    .post-card h2 a{color:var(--text-primary);text-decoration:none;transition:color var(--transition)}
    .post-card h2 a:hover{color:var(--accent)}
    .post-card .summary{font-size:.9rem;color:var(--text-secondary);line-height:1.7;margin-bottom:.85rem}
    .post-card .read-more{
      font-family:var(--font-mono);font-size:.78rem;font-weight:600;
      color:var(--accent);text-decoration:none;
      display:inline-flex;align-items:center;gap:.35rem;
      transition:gap var(--transition);
    }
    .post-card .read-more::after{content:"→";transition:transform var(--transition)}
    .post-card:hover .read-more{gap:.55rem}
    .post-card:hover .read-more::after{transform:translateX(2px)}

    /* ---------- Tech tags (optional flair) ---------- */
    .post-card .meta-tags{
      display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.25rem;
    }
    .post-card .meta-tags span{
      font-family:var(--font-mono);font-size:.68rem;font-weight:500;
      padding:.15rem .55rem;border-radius:99px;
      background:var(--accent-soft);color:var(--accent);
      border:1px solid var(--border-accent);
    }

    /* ---------- Article Detail ---------- */
    .article-header{margin-bottom:2rem}
    .article-header time{
      display:inline-flex;align-items:center;gap:.4rem;
      font-family:var(--font-mono);font-size:.82rem;color:var(--text-tertiary);
      margin-bottom:.75rem;
    }
    .article-header time::before{
      content:"";display:inline-block;width:7px;height:7px;
      background:var(--accent);border-radius:50%;
      box-shadow:0 0 8px var(--accent-glow);
    }
    .article-header h1{
      font-family:var(--font-mono);font-size:2rem;font-weight:700;
      line-height:1.3;letter-spacing:-.03em;color:var(--text-primary);margin-bottom:.75rem;
    }
    .article-meta{
      display:flex;flex-wrap:wrap;gap:1rem;align-items:center;
      font-size:.85rem;color:var(--text-secondary);
    }
    .article-meta .authors{
      display:flex;align-items:center;gap:.35rem;
    }
    .article-meta .authors::before{
      content:"@";color:var(--accent);font-family:var(--font-mono);font-weight:600;
    }

    /* ---------- Article Body ---------- */
    .article-body{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:2.25rem 2.25rem;
      line-height:1.85;font-size:1rem;
      box-shadow:var(--shadow-card);
    }
    .article-body > * + *{margin-top:1.25rem}
    .article-body h2{
      font-family:var(--font-mono);font-size:1.35rem;font-weight:700;
      color:var(--text-primary);margin-top:2.5rem;padding-bottom:.55rem;
      border-bottom:1px solid var(--border-light);letter-spacing:-.02em;
      position:relative;
    }
    .article-body h2::after{
      content:"";display:block;width:32px;height:3px;
      background:var(--gradient-accent);border-radius:2px;margin-top:.55rem;
    }
    .article-body h3{
      font-family:var(--font-mono);font-size:1.1rem;font-weight:600;
      color:var(--text-primary);margin-top:1.85rem;
    }
    .article-body h4,.article-body h5,.article-body h6{
      font-weight:600;color:var(--text-primary);margin-top:1.5rem;
    }
    .article-body p{margin-top:.85rem;color:var(--text-primary)}
    .article-body a{
      color:var(--accent);text-decoration:none;font-weight:500;
      background:linear-gradient(var(--accent),var(--accent)) 0 100% / 0 1px no-repeat;
      transition:background-size var(--transition);
      padding-bottom:1px;
    }
    .article-body a:hover{background-size:100% 1px}
    .article-body ul,.article-body ol{padding-left:1.5rem}
    .article-body li{margin-top:.4rem}
    .article-body li::marker{color:var(--accent)}
    .article-body blockquote{
      border-left:3px solid var(--accent);
      padding:.85rem 1.35rem;margin:1.5rem 0;
      background:var(--accent-soft);
      border-radius:0 var(--radius) var(--radius) 0;
      color:var(--text-secondary);font-style:italic;
      position:relative;
    }
    .article-body blockquote::before{
      content:"\201C";position:absolute;top:-8px;left:8px;
      font-size:2.5rem;color:var(--accent);opacity:.2;
      font-family:Georgia,serif;line-height:1;
    }
    .article-body hr{
      border:none;border-top:1px solid var(--border-light);margin:2rem 0;
      position:relative;overflow:visible;
    }
    .article-body hr::after{
      content:"*  *  *";position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);background:var(--bg-secondary);
      padding:0 1rem;font-family:var(--font-mono);font-size:.7rem;
      color:var(--text-tertiary);letter-spacing:.3em;
    }

    /* Code */
    .article-body pre{
      background:var(--bg-code);border:1px solid var(--border);
      border-radius:var(--radius);padding:1.35rem 1.6rem;overflow-x:auto;
      font-family:var(--font-mono);font-size:.85rem;line-height:1.7;
      margin:1.35rem 0;position:relative;
    }
    /* Pseudo title bar on code blocks */
    .article-body pre::before{
      content:"";
      display:block;position:absolute;top:.65rem;left:1rem;
    }
    .article-body code{
      font-family:var(--font-mono);font-size:.88em;
      background:var(--accent-soft);color:var(--accent);
      padding:.15em .45em;border-radius:4px;
      border:1px solid var(--border-accent);
    }
    .article-body pre code{
      background:none;padding:0;border:none;color:var(--text-primary);font-size:.85rem;
    }

    /* Tables */
    .article-body table{
      width:100%;border-collapse:collapse;margin:1.35rem 0;font-size:.9rem;
      border-radius:var(--radius);overflow:hidden;
      border:1px solid var(--border);
    }
    .article-body thead{background:var(--bg-code)}
    .article-body th{
      font-family:var(--font-mono);font-weight:600;text-align:left;
      padding:.7rem .9rem;border-bottom:2px solid var(--accent);
      color:var(--text-primary);font-size:.78rem;
      text-transform:uppercase;letter-spacing:.05em;
    }
    .article-body td{padding:.6rem .9rem;border-bottom:1px solid var(--border-light)}
    .article-body tr:last-child td{border-bottom:none}
    .article-body tbody tr:hover td{background:var(--accent-soft)}
    .article-body img{max-width:100%;height:auto;border-radius:var(--radius);margin:1.35rem 0}

    /* ---------- Pagination ---------- */
    .pagination{
      display:flex;align-items:center;justify-content:center;gap:1rem;
      margin-top:3rem;padding:1.25rem 0;
    }
    .pagination a{
      font-family:var(--font-mono);font-size:.82rem;font-weight:600;
      color:var(--accent);text-decoration:none;
      padding:.55rem 1.15rem;
      border:1px solid var(--border);border-radius:var(--radius);
      background:var(--bg-secondary);
      box-shadow:var(--shadow-card);
      transition:all var(--transition);
      display:inline-flex;align-items:center;gap:.35rem;
    }
    .pagination a:hover{
      background:var(--accent);color:#fff;
      border-color:var(--accent);box-shadow:var(--shadow-card-hover);
      transform:translateY(-1px);
    }
    .pagination span{
      font-family:var(--font-mono);font-size:.82rem;color:var(--text-tertiary);
      padding:.5rem .75rem;
    }

    /* ---------- Archives ---------- */
    .archive-year{
      font-family:var(--font-mono);font-size:.75rem;font-weight:600;
      color:var(--accent);text-transform:uppercase;letter-spacing:.06em;
      margin:1.5rem 0 .5rem;padding-left:.25rem;
      display:flex;align-items:center;gap:.5rem;
    }
    .archive-year::after{
      content:"";flex:1;height:1px;background:var(--border-light);
    }
    .archive-list{list-style:none;display:flex;flex-direction:column;gap:.15rem}
    .archive-list li{
      display:flex;align-items:baseline;gap:1.2rem;
      padding:.58rem 1rem;border-radius:var(--radius);
      transition:all var(--transition);
      border:1px solid transparent;
    }
    .archive-list li:hover{
      background:var(--bg-secondary);border-color:var(--border);
      box-shadow:var(--shadow-card);
    }
    .archive-list time{
      font-family:var(--font-mono);font-size:.78rem;color:var(--text-tertiary);
      white-space:nowrap;min-width:6em;
    }
    .archive-list a{
      color:var(--text-primary);text-decoration:none;font-weight:500;
      transition:color var(--transition);flex:1;
    }
    .archive-list a:hover{color:var(--accent)}
    .archive-list .count{
      font-family:var(--font-mono);font-size:.7rem;color:var(--text-tertiary);
      background:var(--bg-code);padding:.12rem .5rem;border-radius:99px;
    }

    /* ---------- 404 ---------- */
    .error-page{text-align:center;padding:5rem 0}
    .error-page .error-code{
      font-family:var(--font-mono);font-size:6rem;font-weight:800;
      background:var(--gradient-accent);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1;margin-bottom:1rem;letter-spacing:-.04em;
    }
    .error-page h1{font-size:1.5rem;margin-bottom:.75rem}
    .error-page p{color:var(--text-secondary);margin-bottom:2.25rem}
    .error-page a{
      font-family:var(--font-mono);font-weight:600;font-size:.88rem;
      color:#fff;text-decoration:none;
      padding:.65rem 1.75rem;
      background:var(--accent);border-radius:var(--radius);
      transition:all var(--transition);
      box-shadow:0 2px 8px var(--accent-glow);
    }
    .error-page a:hover{
      background:var(--accent-hover);
      box-shadow:0 4px 16px var(--accent-glow);
      transform:translateY(-1px);
    }

    /* ---------- Empty State ---------- */
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--text-tertiary)}
    .empty-state .empty-icon{
      font-family:var(--font-mono);font-size:3rem;margin-bottom:1rem;opacity:.35;
    }
    .empty-state p{font-family:var(--font-mono);font-size:.85rem}

    /* ---------- Footer ---------- */
    .site-footer{
      border-top:1px solid var(--border-light);padding:2rem 0;text-align:center;
      font-size:.78rem;color:var(--text-tertiary);font-family:var(--font-mono);
    }
    .site-footer .footer-dot{
      display:inline-block;width:4px;height:4px;
      background:var(--accent);border-radius:50%;
      margin:0 .4rem;vertical-align:middle;
    }

    /* ---------- Scrollbar ---------- */
    @media (prefers-color-scheme: dark) {
      ::-webkit-scrollbar{width:6px;height:6px}
      ::-webkit-scrollbar-track{background:var(--bg-primary)}
      ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
      ::-webkit-scrollbar-thumb:hover{background:#475569}
    }

    /* ---------- A11y ---------- */
    :focus-visible{
      outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }

    /* ---------- Responsive ---------- */
    @media (max-width:640px){
      .container{padding:0 1rem}
      .site-header .container{height:50px}
      .site-brand{font-size:.92rem}
      .site-nav a{font-size:.78rem;padding:.35rem .6rem}
      .page-header h1{font-size:1.5rem}
      .post-card{padding:1.2rem 1.25rem}
      .post-card h2{font-size:1.1rem}
      .article-header h1{font-size:1.5rem}
      .article-body{padding:1.3rem 1.25rem;font-size:.93rem}
      .article-body pre{
        padding:1rem .85rem;font-size:.78rem;
        margin-left:-.4rem;margin-right:-.4rem;border-radius:0;
      }
      .archive-list li{flex-direction:column;gap:.1rem;padding:.5rem .75rem}
      .error-page .error-code{font-size:4rem}
      .post-card::before{left:12px;right:12px}
    }

    /* Larger screens — subtle layout enhancement */
    @media (min-width:1024px){
      .site-main{padding:3.5rem 0 5rem}
      .article-body{padding:2.5rem 3rem}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-brand">随笔记录</a>
      <nav class="site-nav">
        <a href="/" {% if request.path == "/" %}class="active"{% endif %}>首页</a>
        <a href="/archives.html" {% if request.path == "/archives.html" %}class="active"{% endif %}>归档</a>
        <a href="/topic/about.html" {% if request.path == "/topic/about.html" %}class="active"{% endif %}>关于</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      随笔记录<span class="footer-dot"></span>互联网开发 · 前端 · 后端 · AI
    </div>
  </footer>
</body>
</html>
