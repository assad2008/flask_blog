{% extends "light/base.html" %}

{% block title %}{{ topic.title }} — 随笔记录{% endblock %}

{% block content %}
  <article>
    <header class="article-header">
      {% if topic.date %}
        <time datetime="{{ topic.date.isoformat() }}">{{ topic.date.isoformat() }}</time>
      {% endif %}
      <h1>{{ topic.title }}</h1>
      {% if topic.summary %}
        <p style="color:var(--text-secondary);font-size:.95rem;margin-top:.25rem;">{{ topic.summary }}</p>
      {% endif %}
    </header>

    <div class="article-body">
      {{ topic.html | safe }}
    </div>
  </article>
{% endblock %}
